name: AC Dashboard Auto Update

on:
  schedule:
    # 매주 월요일 오전 10:00 KST (= 01:00 UTC)
    - cron: '0 1 * * 1'
  workflow_dispatch:   # GitHub Actions 페이지에서 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 저장소 체크아웃 ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 설정 ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 의존성 설치 ──────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install \
            google-analytics-data \
            google-auth \
            python-dotenv

      # ── 4. GA4 서비스 계정 JSON 파일 생성 ───────────────────
      - name: Write GA4 service account credentials
        env:
          GA4_SA_JSON: ${{ secrets.GA4_SA_JSON }}
        run: echo "$GA4_SA_JSON" > service_account.json

      # ── 5. 전체 업데이트 실행 ────────────────────────────────
      - name: Run auto_update.py
        env:
          GA4_PROPERTY_ID:      ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SERVICE_ACCOUNT_JSON: service_account.json
          PINTEREST_TOKEN:      ${{ secrets.PINTEREST_TOKEN }}
          INSTAGRAM_TOKEN:      ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          GITHUB_TOKEN:         ${{ secrets.GH_PAT }}
          GITHUB_USERNAME:      goooodmin
          GITHUB_REPO:          ac-dashboard
        run: python auto_update.py

      # ── 6. Pinterest 토큰 갱신 (refresh_token은 매 호출 시 회전됨) ──
      - name: Refresh Pinterest token and rotate secrets
        env:
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_APP_ID:        ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET:    ${{ secrets.PINTEREST_APP_SECRET }}
          GH_TOKEN:                ${{ secrets.GH_PAT }}
        run: |
          python - <<'PYEOF'
          import os, json, base64, http.client, ssl, urllib.parse, subprocess, sys

          app_id     = os.environ["PINTEREST_APP_ID"]
          app_secret = os.environ["PINTEREST_APP_SECRET"]
          refresh    = os.environ["PINTEREST_REFRESH_TOKEN"]

          creds = base64.b64encode(f"{app_id}:{app_secret}".encode()).decode()
          body = urllib.parse.urlencode({
              "grant_type": "refresh_token",
              "refresh_token": refresh,
          }).encode()

          ctx = ssl.create_default_context()
          conn = http.client.HTTPSConnection("api.pinterest.com", context=ctx)
          conn.request("POST", "/v5/oauth/token", body=body, headers={
              "Authorization": f"Basic {creds}",
              "Content-Type": "application/x-www-form-urlencoded",
          })
          res = conn.getresponse()
          result = json.loads(res.read().decode())

          if res.status != 200 or "access_token" not in result or "refresh_token" not in result:
              print(f"  Pinterest 토큰 갱신 실패 (status {res.status})", file=sys.stderr)
              sys.exit(0)  # 메인 업데이트는 이미 끝났으므로 워크플로우 자체는 실패시키지 않음

          # 토큰 값은 절대 stdout/stderr에 출력하지 않고 gh secret set의 stdin으로만 전달
          subprocess.run(["gh", "secret", "set", "PINTEREST_TOKEN"],
                          input=result["access_token"], text=True, check=True)
          subprocess.run(["gh", "secret", "set", "PINTEREST_REFRESH_TOKEN"],
                          input=result["refresh_token"], text=True, check=True)

          print("  Pinterest 액세스 토큰 + 리프레시 토큰 갱신 완료")
          PYEOF

      # ── 7. Instagram 토큰 갱신 (60일 → 60일 자동 연장) ──────
      - name: Refresh Instagram access token
        id: ig_refresh
        env:
          INSTAGRAM_TOKEN: ${{ secrets.INSTAGRAM_TOKEN }}
        run: |
          NEW_TOKEN=$(python - <<'PYEOF'
          import os, json, urllib.request, sys
          token = os.environ.get("INSTAGRAM_TOKEN", "")
          if not token:
              print("SKIP")
              sys.exit(0)
          url = (f"https://graph.instagram.com/refresh_access_token"
                 f"?grant_type=ig_refresh_token&access_token={token}")
          try:
              with urllib.request.urlopen(url) as r:
                  data = json.loads(r.read())
              new = data.get("access_token", "")
              days = int(data.get("expires_in", 0)) // 86400
              print(new, file=sys.stderr)   # 로그용 (출력에는 안 남음)
              print(new)                    # 캡처용
              print(f"  토큰 갱신 완료 — 유효기간 {days}일", file=sys.stderr)
          except Exception as e:
              print(f"  토큰 갱신 실패: {e}", file=sys.stderr)
              print("FAILED")
          PYEOF
          )
          echo "new_token=$NEW_TOKEN" >> $GITHUB_OUTPUT

      - name: Update INSTAGRAM_TOKEN secret
        if: |
          steps.ig_refresh.outputs.new_token != 'FAILED' &&
          steps.ig_refresh.outputs.new_token != 'SKIP' &&
          steps.ig_refresh.outputs.new_token != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "${{ steps.ig_refresh.outputs.new_token }}" | gh secret set INSTAGRAM_TOKEN
          echo "  INSTAGRAM_TOKEN 시크릿 업데이트 완료"
